name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Format, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (all targets, all features)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test (default features)
        run: cargo test
      - name: Test (no default features, verification core)
        run: cargo test --no-default-features --features alloc

  no_std:
    name: no_std / wasm guest core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Build no_std core (host)
        run: cargo build --no-default-features --features alloc
      - name: Build no_std core (wasm32)
        run: cargo build --no-default-features --features alloc --target wasm32-unknown-unknown
